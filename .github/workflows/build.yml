name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build solution
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GMConverter.slnx

      - name: Format check
        run: dotnet format GMConverter.slnx --verify-no-changes --severity warn --no-restore

      - name: Build
        run: dotnet build GMConverter.slnx --configuration Release --no-restore
