name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  conventional-title:
    name: Conventional PR title
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([A-Za-z0-9._/-]+\))?!?: .+'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error title=Invalid PR title::PR title must use Conventional Commit format."
            echo "Expected examples:"
            echo "  feat(ui): add explorer preview"
            echo "  fix(gltf): write texture sampler defaults"
            echo "  docs: update README"
            exit 1
          fi
